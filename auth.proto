syntax = "proto3";

import "google/protobuf/empty.proto";

package app.v1;

service AuthService {
  rpc GetMembers(google.protobuf.Empty) returns (MemberCollection);
}

message MemberCollection {
  repeated Member members = 1;
}

message Member {
  uint64 user_id = 1;
  string username = 2;
  string avatar = 3;
}